<body>
	<center>
		<p>Inscription des Etudiants en ligne</p>
		<form method="POST" action="Ajouter.php">
			<table border=1>
				<tr>
					<td>Numero : </td>
					<td><input type="number" name="numero"></td>

					<td><input type="email" name="mail"></td>
